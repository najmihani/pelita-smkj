<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembaca Majalah Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #333; margin: 0; overflow: hidden; user-select: none; }
        #viewer-container {
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            max-width: 100%;
        }
        /* Watermark Style */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            white-space: nowrap;
            z-index: 9999;
            font-weight: bold;
            text-transform: uppercase;
        }
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            z-index: 1000;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        @media print { body { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="wm" class="watermark"></div>

    <div class="toolbar">
        <button class="btn btn-sm btn-light" onclick="changePage(-1)">Sblm</button>
        <span id="page-info">Muka surat: <span id="page-num">0</span> / <span id="page-count">0</span></span>
        <button class="btn btn-sm btn-light" onclick="changePage(1)">Seterusnya</button>
        <button class="btn btn-sm btn-danger ms-3" onclick="window.location.href='dashboard.html'">Tutup</button>
    </div>

    <div id="viewer-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

<script>
    // 1. Ambil Data dari Session
    const fileID = sessionStorage.getItem("currentFileID");
    const userNama = sessionStorage.getItem("userNama");
    const userIC = sessionStorage.getItem("userIC");

    // Sekuriti: Jika tiada fileID atau user, tendang balik
    if (!fileID || !userNama) {
        window.location.href = "index.html";
    }

    // Set Watermark
    document.getElementById('wm').innerText = `${userNama} | ${userIC}`;

    // 2. Konfigurasi PDF.js
    const url = `https://lh3.googleusercontent.com/d/${fileID}`; // Link rahsia untuk tarik fail Google Drive
    
    let pdfDoc = null,
        pageNum = 1,
        canvas = document.getElementById('pdf-canvas'),
        ctx = canvas.getContext('2d');

    // Render Muka Surat
    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            page.render(renderContext);
            document.getElementById('page-num').textContent = num;
        });
    }

    // Tukar Muka Surat
    function changePage(delta) {
        if (pageNum + delta <= 0 || pageNum + delta > pdfDoc.numPages) return;
        pageNum += delta;
        renderPage(pageNum);
        document.getElementById('viewer-container').scrollTop = 0;
    }

    // Muat Turun & Papar PDF
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    pdfjsLib.getDocument(url).promise.then(pdf => {
        pdfDoc = pdf;
        document.getElementById('page-count').textContent = pdf.numPages;
        renderPage(pageNum);
    }).catch(err => {
        alert("Ralat: Fail PDF tidak ditemui atau akses ditolak.");
        console.error(err);
    });

    // Sekuriti Tambahan: Sekat Print (Ctrl+P)
    window.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's')) {
            e.preventDefault();
            alert("Fungsi ini disekat demi keselamatan kandungan.");
        }
    });
</script>
</body>
</html>
